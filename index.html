<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>漆黒の翼 Web Novel Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app" class="app">
    <section id="stage" class="stage" aria-label="ゲーム画面">
      <div class="visuals" aria-hidden="true">
        <img id="bg-image" class="bg-image" alt="">
        <img id="character-image" class="character-image is-hidden" data-position="center" alt="">
      </div>
      <div class="vignette"></div>

      <div class="topbar">
        <div>
          <p class="label">現在の場面</p>
          <h1 id="scene-title">Loading...</h1>
        </div>
        <div class="controls" aria-label="操作ボタン">
          <button id="save-btn" type="button">Save</button>
          <button id="load-btn" type="button">Load</button>
          <button id="reset-btn" type="button">Reset</button>
        </div>
      </div>

      <aside class="status" aria-label="ステータス">
        <div><span>NAME</span><strong id="stat-name"></strong></div>
        <div><span>HP</span><strong id="stat-hp"></strong></div>
        <div><span>MP</span><strong id="stat-mp"></strong></div>
        <div><span>RANK</span><strong id="stat-rank"></strong></div>
        <div><span>CONTRACT</span><strong id="stat-contract"></strong></div>
      </aside>

      <section class="textbox" aria-live="polite">
        <div id="backlog" class="backlog"></div>
        <p id="speaker" class="speaker"></p>
        <p id="line" class="line"></p>
        <div id="choices" class="choices"></div>
        <p class="hint">クリック / Enter / Space：次へ　Esc：セーブ</p>
      </section>
    </section>
  </main>

  <script src="story.js"></script>
  <script src="game.js"></script>
</body>
</html>
